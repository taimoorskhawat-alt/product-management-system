<div class="container mt-4">
  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="card shadow-sm">

        <div class="card-header bg-warning text-dark">
          Edit Product
        </div>

        <div class="card-body">

          <form [formGroup]="productForm" (ngSubmit) ="editproducts()">

            
            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" formControlName="name">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Item Code</label>
                <input type="text" class="form-control" formControlName="itemCode">
              </div>

            </div>

            <!-- Row 2 -->
            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" formControlName="category">
                  <option value="">Select Category</option>
                  <option>Food</option>
                  <option>Electronics</option>
                  <option>Fashion</option>
                  <option>Sports</option>
                  <option>Furniture</option>
                  <option>Books</option>
                  <option>Medicine</option>
                  <option>Cosmetics</option>
                  <option>Toys</option>
                  <option>Stationery</option>
                  <option>Home Appliances</option>
                  <option>Accessories</option>
                  <option>Others</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Brand</label>
                <input type="text" class="form-control" formControlName="brand">
              </div>

            </div>

            <!-- Row 3 -->
            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Price</label>
                <input type="number" class="form-control" formControlName="price" min="1">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" formControlName="quantity" min="0">
              </div>

            </div>

            <!-- Description -->
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea rows="4" class="form-control" formControlName="description"></textarea>
            </div>

            <!-- Button -->
            <button type="submit" class="btn btn-warning w-100" >
              Update Product
            </button>

          </form>

        </div>

      </div>

    </div>

  </div>
</div>
