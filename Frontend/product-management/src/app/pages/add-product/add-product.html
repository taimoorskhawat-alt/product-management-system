<div class="container mt-4">
  <div class="row justify-content-center">

    <div class="col-12 col-md-10 col-lg-8">

      <div class="card shadow-sm">

        
        <div class="card-header bg-primary text-white">
          Add Product
        </div>

        <div class="card-body">

          <form [formGroup]="productForm" (ngSubmit)="addProduct()">

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Item Code</label>
                <input type="text" class="form-control" formControlName="itemCode">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" formControlName="name">
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" formControlName="category">
                  <option value="">Select Category</option>
                  <option value="Food">Food</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Fashion">Fashion</option>
                  <option value="Sports">Sports</option>
                  <option value="Furniture">Furniture</option>
                  <option value="Books">Books</option>
                  <option value="Medicine">Medicine</option>
                  <option value="Others">Others</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Brand</label>
                <input type="text" class="form-control" formControlName="brand">
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Price</label>
                <input type="number" class="form-control" formControlName="price" min="1">
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" class="form-control" formControlName="quantity" min="0">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label">Description</label>
              <textarea rows="4" class="form-control" formControlName="description"></textarea>
            </div>

            <button class="btn btn-dark w-100" type="submit">
              Save Product
            </button>

          </form>

        </div>
      </div>

    </div>

  </div>
</div>
